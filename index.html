<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ACLC Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --red:#c8102e; --red-dark:#a00d24;
  --blue:#003087; --blue-mid:#1a56c4; --blue-light:#e8eef8;
  --green:#16a34a; --yellow:#b45309; --muted:#7880a0;
  --text:#0f1535; --bg:#f4f6fb; --border:#e2e6f0;
  --white:#fff; --radius:14px; --radius-sm:8px;
  --shadow:0 2px 12px rgba(0,48,135,.08);
  --shadow-lg:0 8px 32px rgba(0,48,135,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:flex}

/* ── LOGIN ── */
#view-login{
  min-height:100vh;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#003087 0%,#1a56c4 50%,#c8102e 100%);
  padding:20px;
}
.login-card{
  background:var(--white);border-radius:20px;padding:40px 36px;
  width:100%;max-width:420px;box-shadow:var(--shadow-lg);
  animation:fadeUp .5s ease both;
}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{width:72px;height:72px;border-radius:50%;object-fit:cover}
.login-title{font-size:22px;font-weight:700;color:var(--blue);text-align:center;margin-top:10px}
.login-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:3px}
.role-tabs{display:flex;gap:6px;background:var(--bg);border-radius:10px;padding:4px;margin:20px 0}
.role-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s}
.role-tab.active{background:var(--white);color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.form-input{padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border .2s}
.form-input:focus{border-color:var(--blue-mid)}
.form-input.error{border-color:var(--red)}
.login-error{background:#fff0f0;color:var(--red);border:1px solid #ffd0d0;border-radius:8px;padding:10px 13px;font-size:12px;font-weight:500;display:none;margin-bottom:10px}
.login-error.visible{display:block}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:var(--white)}
.btn-primary:hover{background:var(--blue-mid)}
.btn-red{background:var(--red);color:var(--white)}
.btn-red:hover{background:var(--red-dark)}
.btn-ghost{background:transparent;color:var(--blue);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--blue);background:var(--blue-light)}
.btn-full{width:100%;justify-content:center}
.login-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:12px}
.login-hint span{color:var(--blue);font-weight:600}

/* ── APP SHELL ── */
#view-app{min-height:100vh;flex-direction:row}
.sidebar{width:240px;background:var(--blue);color:var(--white);display:flex;flex-direction:column;flex-shrink:0;min-height:100vh}
.sidebar-brand{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo{display:flex;align-items:center;gap:10px}
.sidebar-logo img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.sidebar-name{font-size:15px;font-weight:700}
.sidebar-sub{font-size:10px;opacity:.6;margin-top:1px}
.sidebar-user{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sidebar-avatar{width:38px;height:38px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.sidebar-uname{font-size:13px;font-weight:600}
.sidebar-role{font-size:10px;opacity:.65;margin-top:1px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.45;padding:14px 20px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:500;opacity:.75;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{opacity:1;background:rgba(255,255,255,.06)}
.nav-item.active{opacity:1;background:rgba(255,255,255,.12);border-left-color:var(--white)}
.nav-icon{font-size:15px;width:20px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.logout-btn{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;opacity:.7;cursor:pointer;transition:opacity .2s}
.logout-btn:hover{opacity:1}
.main{flex:1;overflow-y:auto;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-bar{width:4px;height:36px;background:linear-gradient(to bottom,var(--blue),var(--red));border-radius:4px}
.page-title{font-size:18px;font-weight:700;color:var(--text)}
.page-sub{font-size:12px;color:var(--muted);margin-top:2px}
.topbar-actions{display:flex;gap:8px;align-items:center}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:20px 24px 0}
.stat-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px;animation:fadeUp .4s ease both}
.stat-icon{font-size:22px}
.stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.stat-value{font-size:32px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.stat-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;display:inline-block;width:fit-content}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-green{background:#f0fdf4;color:var(--green)}
.badge-red{background:#fff0f0;color:var(--red)}
.badge-yellow{background:#fffbeb;color:var(--yellow)}

/* ── PANELS ── */
.content-area{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.panel-title{font-size:14px;font-weight:700;color:var(--text)}
.panel-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── CHARTS ── */
.chart-area{padding:16px 20px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px}
.bar-group{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .4s ease;min-height:4px;background:linear-gradient(to top,var(--blue),var(--blue-mid))}
.bar-val{font-size:10px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.bar-label{font-size:10px;color:var(--muted)}
.donut-wrap{display:flex;align-items:center;gap:20px;padding:20px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{font-size:12px;color:var(--muted);flex:1}
.legend-val{font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
.legend-pct{font-size:11px;color:var(--muted);width:36px;text-align:right}

/* ── ATTENDANCE TABLE ── */
.class-tabs{display:flex;gap:6px;padding:14px 20px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.class-tab{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;color:var(--muted)}
.class-tab.active{background:var(--blue);color:var(--white);border-color:var(--blue)}
.date-tabs{display:flex;gap:4px;padding:12px 20px;border-bottom:1px solid var(--border);overflow-x:auto}
.date-tab{display:flex;flex-direction:column;align-items:center;padding:8px 12px;border-radius:8px;cursor:pointer;transition:all .15s;border:1.5px solid transparent;min-width:48px}
.date-tab:hover{background:var(--blue-light)}
.date-tab.active{background:var(--blue);color:var(--white)}
.day-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;opacity:.7}
.day-num{font-size:16px;font-weight:700;font-family:'DM Mono',monospace}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border)}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;flex:1}
.search-bar input{border:none;outline:none;background:none;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);width:100%}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg)}
td{padding:10px 16px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.student-info{display:flex;align-items:center;gap:10px}
.student-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:700;font-size:11px;flex-shrink:0}
.student-name{font-size:13px;font-weight:600}
.table-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--border);font-size:12px}
.save-hint{font-size:12px;color:var(--muted)}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}

/* ── STATUS ── */
.status-select{padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;background:var(--white)}
.status-select.present{border-color:var(--green);color:var(--green);background:#f0fdf4}
.status-select.absent{border-color:var(--red);color:var(--red);background:#fff0f0}
.status-select.late{border-color:var(--yellow);color:var(--yellow);background:#fffbeb}

/* ── STUDENT PROFILE ── */
.profile-card{background:var(--white);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);display:flex;align-items:center;gap:20px}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:22px;font-weight:700;flex-shrink:0}
.profile-name{font-size:18px;font-weight:700}
.profile-id{font-size:12px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace}
.profile-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.rate-bar{background:var(--bg);border-radius:var(--radius);padding:20px;margin-top:4px}
.rate-track{background:var(--border);border-radius:20px;height:8px;margin:8px 0;overflow:hidden}
.rate-fill{height:100%;border-radius:20px;background:linear-gradient(to right,var(--blue),var(--green));transition:width .8s ease}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.summary-card{background:var(--white);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);text-align:center}
.summary-num{font-size:36px;font-weight:700;font-family:'DM Mono',monospace}
.summary-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}

/* ── STUDENTS/CLASSES PAGES ── */
.students-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:16px 20px}
.student-card{background:var(--white);border-radius:10px;padding:14px;border:1px solid var(--border);display:flex;align-items:center;gap:12px;transition:box-shadow .15s}
.student-card:hover{box-shadow:var(--shadow)}
.s-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:700;font-size:13px;flex-shrink:0}
.s-info{flex:1;min-width:0}
.s-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-meta{font-size:11px;color:var(--muted);margin-top:1px}
.s-usn{font-size:10px;color:var(--blue);font-family:'DM Mono',monospace;margin-top:2px}
.section-header{font-size:13px;font-weight:700;color:var(--blue);padding:12px 20px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg)}

/* ── SETTINGS ── */
.settings-wrap{max-width:520px;padding:20px 24px;display:flex;flex-direction:column;gap:14px}

/* ── REPORTS ── */
.reports-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:20px 24px}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.report-row:last-child{border-bottom:none}

/* ── ADD STUDENT MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px;padding:28px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);animation:fadeUp .3s ease both;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:var(--blue);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}
.two-inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-select{padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;background:var(--white);width:100%}
.form-select:focus{border-color:var(--blue-mid)}

/* ── MISC ── */
.empty{text-align:center;padding:48px;color:var(--muted);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     LOGIN VIEW
══════════════════════════════════════════ -->
<div class="view active" id="view-login">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="ACLC"/>
      <div class="login-title">ACLC Monitor</div>
      <div class="login-sub">School Attendance Management System</div>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('admin',this)">🛡 Admin</button>
      <button class="role-tab" onclick="setRole('teacher',this)">📋 Teacher</button>
      <button class="role-tab" onclick="setRole('student',this)">🎓 Student</button>
    </div>
    <div class="login-error" id="login-error">Incorrect username or password.</div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" id="login-username" type="text" placeholder="Enter your username" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="login-password" type="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-hint" style="margin-top:14px">
      Admin: <span>admin / admin123</span> · Teacher: <span>teacher1 / teacher123</span><br/>
      Student: <span>student1 / student123</span>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     APP VIEW
══════════════════════════════════════════ -->
<div class="view" id="view-app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">
        <img src="logo.png" alt="ACLC"/>
        <div>
          <div class="sidebar-name">ACLC Monitor</div>
          <div class="sidebar-sub" id="sb-school-sub">Attendance System</div>
        </div>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sb-initials">AD</div>
      <div>
        <div class="sidebar-uname" id="sb-name">Administrator</div>
        <div class="sidebar-role" id="sb-role">Admin</div>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="logout-btn" onclick="doLogout()">
        <span>⎋</span> Sign Out
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main" id="main-content"></div>
</div>

<!-- ══════════════════════════════════════════
     ADD STUDENT MODAL
══════════════════════════════════════════ -->
<div class="modal-overlay" id="add-student-modal">
  <div class="modal">
    <div class="modal-title">
      ➕ Add New Student
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label class="form-label">Last Name</label><input class="form-input" id="ns-last" placeholder="e.g. Dela Cruz"/></div>
    <div class="form-group"><label class="form-label">First Name</label><input class="form-input" id="ns-first" placeholder="e.g. Juan"/></div>
    <div class="form-group"><label class="form-label">Middle Name</label><input class="form-input" id="ns-mid" placeholder="Optional"/></div>
    <div class="two-inputs">
      <div class="form-group"><label class="form-label">Age</label><input class="form-input" id="ns-age" type="number" placeholder="16"/></div>
      <div class="form-group"><label class="form-label">Sex</label><select class="form-select" id="ns-sex"><option>Male</option><option>Female</option></select></div>
    </div>
    <div class="form-group"><label class="form-label">USN</label><input class="form-input" id="ns-usn" placeholder="e.g. 2024-00101"/></div>
    <div class="form-group"><label class="form-label">LRN</label><input class="form-input" id="ns-lrn" placeholder="12-digit LRN"/></div>
    <div class="form-group"><label class="form-label">Section</label>
      <select class="form-select" id="ns-section">
        <option value="">-- Select Section --</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Guardian Email</label><input class="form-input" id="ns-email" type="email" placeholder="guardian@email.com"/></div>
    <div class="login-error" id="ns-error"></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-ghost" onclick="closeModal()" style="flex:1">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddStudent()" id="ns-btn" style="flex:2">Add Student</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const API = 'https://aclc-attendance-monitoring-api-production.up.railway.app/api';
const COLORS = ['#003087','#c8102e','#1a56c4','#0891b2','#16a34a','#7c3aed','#b45309','#db2777'];

let currentUser = null;
let authToken   = ''; // Always start fresh — no auto-login from localStorage
let SECTIONS    = [];
let activePage  = 'dashboard';
let activeSection = '';
let activeDate  = new Date().toISOString().split('T')[0];
let loadedStudents = [];

// ── API CALL ──────────────────────────────
async function api(endpoint, method='GET', body=null) {
  const opts = {
    method,
    headers: { 'Content-Type':'application/json', 'X-Auth-Token': authToken },
    mode: 'cors'
  };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(`${API}/${endpoint}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

async function publicApi(endpoint, method='GET', body=null) {
  const opts = { method, headers:{'Content-Type':'application/json'}, mode:'cors' };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(`${API}/${endpoint}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ══════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════
let currentRole = 'admin';
function setRole(role, btn) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('login-username').placeholder = role === 'student' ? 'Enter your USN or username' : 'Enter your username';
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');
  errEl.classList.remove('visible');
  if (!username || !password) { errEl.textContent = 'Please enter username and password.'; errEl.classList.add('visible'); return; }
  // Clear any existing session before logging in
  currentUser = null;
  authToken = '';
  localStorage.removeItem('auth_token');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const data  = await publicApi('login.php', 'POST', { username, password, role: currentRole });
    currentUser = data.user;
    authToken   = data.token;
    localStorage.setItem('auth_token', authToken);
    await showApp();
  } catch(err) {
    errEl.textContent = err.message || 'Incorrect username or password.';
    errEl.classList.add('visible');
  } finally {
    btn.textContent = 'Sign In →'; btn.disabled = false;
  }
}

async function doLogout() {
  try { await api('logout.php','POST'); } catch(e) {}
  currentUser = null; authToken = ''; currentRole = 'admin';
  localStorage.removeItem('auth_token');
  SECTIONS = []; activePage = 'dashboard';
  document.getElementById('view-app').classList.remove('active');
  document.getElementById('view-login').classList.add('active');
  document.getElementById('login-username').value = '';

  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  const adminTab = document.querySelector('.role-tab[data-role="admin"]') || document.querySelector('.role-tab');

  const idLabel = document.getElementById('login-id-label');
  if (idLabel) idLabel.textContent = labels['admin'];
  // Force full page reload to clear all state
  setTimeout(() => window.location.reload(), 100);
}

async function showApp() {

function renderBarChart(weekly, maxVal) {
  const c = document.getElementById('bar-chart'); if(!c) return;
  if (!weekly?.length) { c.innerHTML=`<div style="color:var(--muted);font-size:12px;padding:20px">No data yet — start marking attendance!</div>`; return; }
  const max = maxVal || Math.max(...weekly.map(d=>d.present), 1);
  c.innerHTML = weekly.map(d => {
    if (!d.present) return `<div class="bar-group"><div class="bar-val" style="opacity:.3">0</div><div class="bar" style="height:4px;background:var(--border)"></div><div class="bar-label">${d.day}</div></div>`;
    return `<div class="bar-group"><div class="bar-val">${d.present}</div><div class="bar" style="height:${Math.round((d.present/max)*90)}px"></div><div class="bar-label">${d.day}</div></div>`;
  }).join('');
}

function polar(cx,cy,r,deg){const rad=((deg-90)*Math.PI)/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};}
function arcPath(cx,cy,r,s,e){const a=polar(cx,cy,r,s),b=polar(cx,cy,r,e);return`M${a.x} ${a.y} A${r} ${r} 0 ${e-s>180?1:0} 1 ${b.x} ${b.y}`;}

function renderDonut(present, absent, late) {
  const svg=document.getElementById('donut-svg'), leg=document.getElementById('donut-legend');
  if(!svg||!leg) return;
  const data=[{label:'Present',value:present,color:'#16a34a'},{label:'Absent',value:absent,color:'#c8102e'},{label:'Late',value:late,color:'#b45309'}];
  const total=present+absent+late;
  if(!total){leg.innerHTML=`<div style="color:var(--muted);font-size:12px">No data yet.</div>`;return;}
  let cur=0;
  svg.innerHTML=`<text x="55" y="50" text-anchor="middle" style="font-size:18px;font-weight:700;font-family:'DM Mono',monospace;fill:#0f1535">${total}</text><text x="55" y="66" text-anchor="middle" style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;fill:#7880a0">Total</text>`;
  data.forEach(s=>{const deg=(s.value/total)*360,end=cur+deg-1.5,p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',arcPath(55,55,40,cur,end));p.setAttribute('fill','none');p.setAttribute('stroke',s.color);p.setAttribute('stroke-width',14);p.setAttribute('stroke-linecap','round');svg.appendChild(p);cur+=deg;});
  leg.innerHTML=data.map(s=>`<div class="legend-item"><div class="legend-dot" style="background:${s.color}"></div><span class="legend-label">${s.label}</span><span class="legend-val">${s.value}</span><span class="legend-pct">${((s.value/total)*100).toFixed(1)}%</span></div>`).join('');
}

async function initAttendance() {
  activeSection = currentUser.role==='teacher' ? currentUser.section : (SECTIONS[0]?.name||'');
  buildDateTabs();
  await loadStudents();
}

function buildDateTabs() {
  const c = document.getElementById('date-tabs'); if(!c) return;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html='';
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const iso=d.toISOString().split('T')[0];
    html+=`<div class="date-tab ${iso===activeDate?'active':''}" onclick="switchDate('${iso}',this)">
      <span class="day-name">${days[d.getDay()]}</span>
      <span class="day-num">${d.getDate()}</span>
    </div>`;
  }
  c.innerHTML=html;
  updateDateLabel();
}

function updateDateLabel(){
  const el=document.getElementById('att-date-label');
  if(el) el.textContent=new Date(activeDate+'T00:00:00').toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

async function loadStudents() {
  const tb=document.getElementById('att-tbody');
  if(tb) tb.innerHTML=`<tr><td colspan="7" class="empty"><span class="spinner"></span></td></tr>`;
  try {
    const d=await api(`students.php?section=${encodeURIComponent(activeSection)}&date=${activeDate}`);
    loadedStudents=d.students||[];
    renderTable(loadedStudents);
    const cnt=document.getElementById('att-count');
    if(cnt) cnt.textContent=`${loadedStudents.length} students · ${activeSection}`;
  } catch(err){
    if(tb) tb.innerHTML=`<tr><td colspan="7" class="empty" style="color:var(--red)">${err.message}</td></tr>`;
  }
}

function renderTable(list) {
  const tb=document.getElementById('att-tbody'); if(!tb) return;
  const isTeacher=currentUser.role==='teacher';
  if(!list.length){tb.innerHTML=`<tr><td colspan="7" class="empty">No students found.</td></tr>`;return;}
  tb.innerHTML=list.map((s,i)=>{
    const ini=((s.first_name||'').charAt(0)+(s.last_name||'').charAt(0)).toUpperCase();
    const name=s.full_name||`${s.last_name}, ${s.first_name}`;
    const r=(s.remarks||'').toLowerCase();
    let status='absent',statusLabel='Absent';
    if(s.remarks&&!r.includes('tardy')&&!r.includes('late')){status='present';statusLabel='Present';}
    else if(r.includes('tardy')||r.includes('late')){status='late';statusLabel='Late';}
    const safeUsn=s.usn.replace(/'/g,"\\'");
    return `<tr>
      <td style="color:var(--muted);font-family:'DM Mono',monospace;font-size:12px">${String(i+1).padStart(2,'0')}</td>
      <td><div class="student-info">
        <div class="student-avatar" style="background:${COLORS[i%COLORS.length]}">${ini}</div>
        <div><div class="student-name">${name}</div><div style="font-size:10px;color:var(--muted)">${s.sex||''}</div></div>
      </div></td>
      <td><span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${s.usn}</span></td>
      ${!isTeacher?`<td><span class="badge badge-blue" style="font-size:10px">${s.section||activeSection}</span></td>`:''}
      <td><select class="status-select ${status}" onchange="setStatus('${safeUsn}',this)">
        <option value="present" ${status==='present'?'selected':''}>Present</option>
        <option value="absent"  ${status==='absent' ?'selected':''}>Absent</option>
        <option value="late"    ${status==='late'   ?'selected':''}>Late</option>
      </select></td>
      <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${s.scanned_at||'—'}</td>
      <td><input type="text" placeholder="Add note…" style="border:none;background:none;outline:none;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--muted);width:110px" value="${s.remarks||''}" oninput="setRemark('${safeUsn}',this.value)"/></td>
    </tr>`;
  }).join('');
  // Apply select colors
  document.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('change',function(){this.className=`status-select ${this.value}`;});
  });
}

function setStatus(usn,sel){
  const s=loadedStudents.find(x=>x.usn===usn); if(!s) return;
  sel.className=`status-select ${sel.value}`;
  if(sel.value==='present'&&!s.remarks) s.remarks='PRESENT';
  else if(sel.value==='late') s.remarks='TARDY';
  else if(sel.value==='absent') s.remarks='';
  markUnsaved();
}
function setRemark(usn,val){ const s=loadedStudents.find(x=>x.usn===usn); if(s){s.remarks=val;markUnsaved();} }
function filterTable(q){ const lq=q.toLowerCase(); renderTable(q?loadedStudents.filter(s=>(s.full_name||'').toLowerCase().includes(lq)||s.usn.includes(q)):loadedStudents); }
function markUnsaved(){ const h=document.getElementById('save-hint'); if(h){h.textContent='⚠ Unsaved changes';h.style.color='var(--yellow)';} }
function markAllPresent(){ loadedStudents.forEach(s=>{s.remarks=s.remarks||'PRESENT';}); renderTable(loadedStudents); markUnsaved(); }

async function saveAttendance(){
  const btn=document.querySelector('[onclick="saveAttendance()"]');
  if(btn){btn.textContent='⏳ Saving…';btn.disabled=true;}
  try{
    const records=loadedStudents.map(s=>({usn:s.usn,scanned_at:s.scanned_at||null,attendance_date:activeDate,remarks:s.remarks||null}));
    await api('attendance.php','POST',{records,date:activeDate});
    const h=document.getElementById('save-hint');
    if(h){h.textContent='✓ Saved!';h.style.color='var(--green)';setTimeout(()=>{h.textContent='—';h.style.color='var(--muted)';},3000);}
  }catch(err){alert('Save failed: '+err.message);}
  finally{if(btn){btn.textContent='💾 Save';btn.disabled=false;}}
}

async function switchSection(name,btn){
  document.querySelectorAll('.class-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); activeSection=name; await loadStudents();
}
async function switchDate(date,btn){
  document.querySelectorAll('.date-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); activeDate=date; updateDateLabel(); await loadStudents();
}

            <div class="profile-badges" style="margin-top:8px">
              <span class="badge badge-blue">${currentUser.section_name||''}</span>
              ${profile?.sex?`<span class="badge badge-blue">${profile.sex}</span>`:''}
            </div>
          </div>
        </div>
        <div class="summary-grid">
          <div class="summary-card"><div class="summary-label">Present</div><div class="summary-num" style="color:var(--green)">${summary.present}</div><span class="badge badge-green">${summary.total>0?Math.round((summary.present/summary.total)*100):0}%</span></div>
          <div class="summary-card"><div class="summary-label">Absent</div><div class="summary-num" style="color:var(--red)">${summary.absent}</div><span class="badge badge-red">${summary.total>0?Math.round((summary.absent/summary.total)*100):0}%</span></div>
          <div class="summary-card"><div class="summary-label">Late</div><div class="summary-num" style="color:var(--yellow)">${summary.late}</div><span class="badge badge-yellow">${summary.total>0?Math.round((summary.late/summary.total)*100):0}%</span></div>
        </div>
        <div class="rate-bar">
          <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600">
            <span>Attendance Rate (last ${summary.total} days)</span>
            <span style="color:${rateColor};font-family:'DM Mono',monospace">${summary.rate}%</span>
          </div>
          <div class="rate-track"><div class="rate-fill" id="rate-fill" style="width:0%;background:${rateColor}"></div></div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${summary.rate>=90?'✅ Excellent attendance!':summary.rate>=75?'⚠️ Acceptable — try to improve.':'❌ Below required threshold.'}</div>
        </div>
        <div class="panel">
          <div class="panel-header"><div><div class="panel-title">Attendance History</div><div class="panel-sub">Last ${summary.total} recorded days</div></div></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Date</th><th>Status</th><th>Scanned At</th><th>Remarks</th></tr></thead>
              <tbody>
                ${history.length?history.map((d,i)=>`<tr>
                  <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${String(i+1).padStart(2,'0')}</td>
                  <td style="font-weight:500">${new Date(d.date+'T00:00:00').toLocaleDateString('en-PH',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}</td>
                  <td><span class="badge ${d.status==='present'?'badge-green':d.status==='late'?'badge-yellow':'badge-red'}">${d.status.charAt(0).toUpperCase()+d.status.slice(1)}</span></td>
                  <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${d.scanned_at||'—'}</td>
                  <td style="font-size:12px;color:var(--muted)">${d.remarks||''}</td>
                </tr>`).join(''):`<tr><td colspan="5" class="empty">No records yet.</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
    setTimeout(()=>{const f=document.getElementById('rate-fill');if(f)f.style.width=summary.rate+'%';},100);
  } catch(err){
    main.innerHTML=`<div class="empty" style="color:var(--red)">${err.message}</div>`;
  }
}

// ══════════════════════════════════════════
//  STUDENTS PAGE
// ══════════════════════════════════════════
function studentsHTML(){
  return `
    <div class="topbar">
      <div class="topbar-left"><div class="topbar-bar"></div>
        <div><div class="page-title">Students</div><div class="page-sub">All enrolled students · AY 2025–2026</div></div>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Add Student</button>
    </div>
    <div style="padding:16px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <div class="search-bar" style="max-width:320px">
        <span style="color:var(--muted)">🔍</span>
        <input type="text" placeholder="Search name, USN, LRN…" oninput="filterStudentsPage(this.value)" id="stu-search"/>
      </div>
      <select class="form-select" style="max-width:160px" id="stu-filter" onchange="filterStudentsPage(document.getElementById('stu-search').value)">
        <option value="">All Sections</option>
        ${SECTIONS.map(s=>`<option>${s.name}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:var(--muted)" id="stu-count"></span>
    </div>
    <div id="stu-list" style="padding:0 24px 24px"><div class="empty"><span class="spinner"></span></div></div>`;
}

let allStudents=[];
async function loadStudentsPage(){
  try{ const d=await api('students.php?all=1'); allStudents=d.students||[]; renderStudentsGrid(allStudents); }
  catch(e){ document.getElementById('stu-list').innerHTML=`<div class="empty" style="color:var(--red)">${e.message}</div>`; }
}
function filterStudentsPage(q){
  const sec=document.getElementById('stu-filter')?.value||'';
  let list=allStudents;
  if(sec) list=list.filter(s=>s.section===sec);
  if(q){const lq=q.toLowerCase();list=list.filter(s=>(s.full_name||'').toLowerCase().includes(lq)||(s.usn||'').includes(q)||(s.lrn||'').includes(q));}
  renderStudentsGrid(list);
}
function renderStudentsGrid(list){
  const c=document.getElementById('stu-list'),cnt=document.getElementById('stu-count');
  if(cnt) cnt.textContent=`${list.length} student${list.length!==1?'s':''}`;
  if(!list.length){c.innerHTML=`<div class="empty">No students found.</div>`;return;}
  c.innerHTML=`<div class="students-grid">${list.map((s,i)=>{
    const ini=((s.first_name||'').charAt(0)+(s.last_name||'').charAt(0)).toUpperCase();
    return `<div class="student-card">
      <div class="s-avatar" style="background:${COLORS[i%COLORS.length]}">${ini}</div>
      <div class="s-info">
        <div class="s-name">${s.last_name}, ${s.first_name}</div>
        <div class="s-meta">${s.section||''} · ${s.sex||''}</div>
        <div class="s-usn">${s.usn}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ══════════════════════════════════════════
//  CLASSES PAGE
// ══════════════════════════════════════════
function classesHTML(){
  return `
    <div class="topbar">
      <div class="topbar-left"><div class="topbar-bar"></div>
        <div><div class="page-title">Classes</div><div class="page-sub">Students grouped by section</div></div>
      </div>
    </div>
    <div id="classes-list"><div class="empty"><span class="spinner"></span></div></div>`;
}
async function loadClassesPage(){
  try{ const d=await api('students.php?all=1'); renderClasses(d.students||[]); }
  catch(e){ document.getElementById('classes-list').innerHTML=`<div class="empty" style="color:var(--red)">${e.message}</div>`; }
}
function renderClasses(students){
  const c=document.getElementById('classes-list');
  const groups={};
  students.forEach(s=>{ if(!groups[s.section]) groups[s.section]=[]; groups[s.section].push(s); });
  c.innerHTML=Object.keys(groups).sort().map(sec=>{
    const list=groups[sec];
    return `<div>
      <div class="section-header">${sec} <span class="badge badge-blue">${list.length} students</span></div>
      <div class="students-grid" style="padding:14px 20px">
        ${list.map((s,i)=>`<div class="student-card">
          <div class="s-avatar" style="background:${COLORS[i%COLORS.length]}">${((s.first_name||'').charAt(0)+(s.last_name||'').charAt(0)).toUpperCase()}</div>
          <div class="s-info">
            <div class="s-name">${s.last_name}, ${s.first_name}</div>
            <div class="s-meta">${s.sex||''} · LRN: ${s.lrn||'—'}</div>
            <div class="s-usn">${s.usn}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  REPORTS PAGE
// ══════════════════════════════════════════
function reportsHTML(){
  return `
    <div class="topbar">
      <div class="topbar-left"><div class="topbar-bar"></div>
        <div><div class="page-title">Reports</div><div class="page-sub">Attendance summary · AY 2025–2026</div></div>
      </div>
      <button class="btn btn-ghost" onclick="exportReport()">⬇ Export Report</button>
    </div>
    <div class="reports-grid">
      <div class="panel" style="padding:20px">
        <div class="panel-title" style="margin-bottom:14px">📊 Students per Section</div>
        <div id="rep-sections"><span class="spinner"></span></div>
      </div>
      <div class="panel" style="padding:20px">
        <div class="panel-title" style="margin-bottom:14px">📅 Today's Summary</div>
        <div id="rep-today"><span class="spinner"></span></div>
      </div>
    </div>`;
}
async function loadReports(){
  try{
    const [dash,stuData]=await Promise.all([api(`dashboard.php?date=${new Date().toISOString().split('T')[0]}`),api('students.php?all=1')]);
    const s=dash.stats;
    const secGroups={};
    (stuData.students||[]).forEach(st=>{if(!secGroups[st.section])secGroups[st.section]=0;secGroups[st.section]++;});
    const secEl=document.getElementById('rep-sections');
    if(secEl) secEl.innerHTML=Object.entries(secGroups).sort().map(([sec,cnt])=>`<div class="report-row"><span>${sec}</span><span class="badge badge-blue">${cnt} students</span></div>`).join('');
    const todEl=document.getElementById('rep-today');
    if(todEl) todEl.innerHTML=`
      <div class="report-row"><span>Total Students</span><span class="badge badge-blue">${s.total}</span></div>
      <div class="report-row"><span>Present</span><span class="badge badge-green">${s.present}</span></div>
      <div class="report-row"><span>Absent</span><span class="badge badge-red">${s.absent}</span></div>
      <div class="report-row"><span>Late / Tardy</span><span class="badge badge-yellow">${s.late}</span></div>`;
  }catch(e){}
}

// ══════════════════════════════════════════
//  SETTINGS PAGE
// ══════════════════════════════════════════
function settingsHTML(){
  return `
    <div class="topbar">
      <div class="topbar-left"><div class="topbar-bar"></div>
        <div><div class="page-title">Settings</div><div class="page-sub">Manage your account</div></div>
      </div>
    </div>
    <div class="settings-wrap">
      <div class="panel" style="padding:24px">
        <div class="panel-title" style="margin-bottom:18px">👤 Account Info</div>
        <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="set-name" value="${currentUser.name}"/></div>
        <div class="form-group"><label class="form-label">Role</label><input class="form-input" value="${currentUser.role}" disabled style="background:var(--bg);color:var(--muted)"/></div>
        ${currentUser.section_name?`<div class="form-group"><label class="form-label">Section</label><input class="form-input" value="${currentUser.section_name}" disabled style="background:var(--bg);color:var(--muted)"/></div>`:''}
        <button class="btn btn-primary" onclick="saveName()">Save Changes</button>
        <span id="name-msg" style="font-size:12px;margin-left:10px;display:none"></span>
      </div>
      <div class="panel" style="padding:24px">
        <div class="panel-title" style="margin-bottom:18px">🔒 Change Password</div>
        <div class="form-group"><label class="form-label">Current Password</label><input class="form-input" type="password" id="set-old" placeholder="Enter current password"/></div>
        <div class="form-group"><label class="form-label">New Password</label><input class="form-input" type="password" id="set-new" placeholder="Min 6 characters"/></div>
        <div class="form-group"><label class="form-label">Confirm New Password</label><input class="form-input" type="password" id="set-confirm" placeholder="Repeat new password"/></div>
        <button class="btn btn-primary" onclick="changePass()">Change Password</button>
        <span id="pass-msg" style="font-size:12px;margin-left:10px;display:none"></span>
      </div>
    </div>`;
}
async function saveName(){
  const name=document.getElementById('set-name').value.trim();
  const msg=document.getElementById('name-msg');
  try{ await api('settings.php','POST',{action:'update_name',name}); currentUser.name=name; document.getElementById('sb-name').textContent=name; msg.style.display='inline';msg.textContent='✅ Saved!';msg.style.color='var(--green)'; setTimeout(()=>msg.style.display='none',3000);}
  catch(e){msg.style.display='inline';msg.textContent='❌ '+e.message;msg.style.color='var(--red)';}
}
async function changePass(){
  const old=document.getElementById('set-old').value,nw=document.getElementById('set-new').value,conf=document.getElementById('set-confirm').value;
  const msg=document.getElementById('pass-msg');
  if(nw!==conf){msg.style.display='inline';msg.textContent='❌ Passwords do not match';msg.style.color='var(--red)';return;}
  try{ await api('settings.php','POST',{action:'change_password',old_password:old,new_password:nw}); msg.style.display='inline';msg.textContent='✅ Changed!';msg.style.color='var(--green)'; document.getElementById('set-old').value=document.getElementById('set-new').value=document.getElementById('set-confirm').value=''; setTimeout(()=>msg.style.display='none',3000);}
  catch(e){msg.style.display='inline';msg.textContent='❌ '+e.message;msg.style.color='var(--red)';}
}

// ══════════════════════════════════════════
//  ADD STUDENT MODAL
// ══════════════════════════════════════════
function openModal(){ document.getElementById('add-student-modal').classList.add('open'); }
function closeModal(){ document.getElementById('add-student-modal').classList.remove('open'); document.getElementById('ns-error').classList.remove('visible'); }
async function submitAddStudent(){
  const last=document.getElementById('ns-last').value.trim(),first=document.getElementById('ns-first').value.trim();
  const usn=document.getElementById('ns-usn').value.trim(),section=document.getElementById('ns-section').value;
  const errEl=document.getElementById('ns-error'),btn=document.getElementById('ns-btn');
  if(!last||!first||!usn||!section){errEl.textContent='Last name, first name, USN and section are required.';errEl.style.display='block';return;}
  btn.textContent='Adding…';btn.disabled=true;
  try{
    await api('students.php','POST',{last_name:last,first_name:first,middle_name:document.getElementById('ns-mid').value.trim(),age:document.getElementById('ns-age').value,sex:document.getElementById('ns-sex').value,usn,lrn:document.getElementById('ns-lrn').value.trim(),section,guardian_email:document.getElementById('ns-email').value.trim()});
    closeModal();
    if(activePage==='students') loadStudentsPage();
    if(activePage==='classes')  loadClassesPage();
    alert('✅ Student added!');
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';}
  finally{btn.textContent='Add Student';btn.disabled=false;}
}

// ══════════════════════════════════════════
//  EXPORTS
// ══════════════════════════════════════════
function downloadCSV(csv,name){const b=new Blob([csv],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

async function exportReport(){
  try{const d=await api('students.php?all=1');let csv='Last Name,First Name,USN,LRN,Section,Sex,Age\n';(d.students||[]).forEach(s=>{csv+=`"${s.last_name}","${s.first_name}","${s.usn}","${s.lrn||''}","${s.section}","${s.sex||''}","${s.age||''}"\n`;});downloadCSV(csv,'ACLC_Report_'+new Date().toISOString().split('T')[0]+'.csv');}
  catch(e){alert('Export failed: '+e.message);}
}

async function exportCSV(){
  try{const d=await api(`students.php?section=${encodeURIComponent(activeSection)}&date=${activeDate}`);let csv='USN,Name,Section,Scanned At,Status,Remarks\n';(d.students||[]).forEach(s=>{const r=(s.remarks||'').toLowerCase();const st=!s.remarks&&!s.scanned_at?'Absent':r.includes('tardy')||r.includes('late')?'Late':'Present';csv+=`"${s.usn}","${s.full_name}","${s.section}","${s.scanned_at||''}","${st}","${s.remarks||''}"\n`;});downloadCSV(csv,`ACLC_Attendance_${activeSection.replace(/\s/g,'_')}_${activeDate}.csv`);}
  catch(e){alert('Export failed: '+e.message);}
}

async function downloadStudentRecord(){
  try{const d=await api(`attendance.php?usn=${encodeURIComponent(currentUser.usn)}&days=365`);let csv='Date,Status,Scanned At,Remarks\n';(d.history||[]).forEach(r=>{csv+=`"${r.date}","${r.status}","${r.scanned_at||''}","${r.remarks||''}"\n`;});downloadCSV(csv,`My_Record_${currentUser.usn}.csv`);}
  catch(e){alert('Download failed: '+e.message);}
}
</script>
